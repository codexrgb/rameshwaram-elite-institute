<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Login - Rameshwaram Elite Institute</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">Rameshwaram Elite</a>
      <ul class="nav-menu">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="admission.html" class="nav-link">Admission</a></li>
      </ul>
    </div>
  </nav>

  <!-- Login Form -->
  <section style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
    <div class="form-container">
      <div style="text-align: center; margin-bottom: 2rem;">
        <h1 style="color: white; font-size: 2.5rem; margin-bottom: 1rem;">Student Login</h1>
        <p style="color: rgba(255,255,255,0.9);">Access your student portal</p>
      </div>
      
      <div id="message"></div>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Email *</label>
          <input type="email" id="loginEmail" name="email" required>
        </div>
        
        <div class="form-group">
          <label for="loginPassword">Password *</label>
          <input type="password" id="loginPassword" name="password" required>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">
          Login
        </button>
      </form>
      
      <p style="text-align: center; margin-top: 1.5rem; color: rgba(255,255,255,0.8);">
        New student? <a href="admission.html" style="color: white; font-weight: 600;">Apply for admission</a>
      </p>
    </div>
  </section>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData);
      
      const messageDiv = document.getElementById('message');
      
      try {
        const response = await fetch('http://localhost:5000/api/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(data)
        });
        
        const result = await response.json();
        
        if (result.success) {
          // Store token
          localStorage.setItem('token', result.token);
          messageDiv.innerHTML = `
            <div class="form-message success">
              ✅ Login successful! Redirecting...
            </div>
          `;
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1500);
        } else {
          messageDiv.innerHTML = `
            <div class="form-message error">
              ❌ ${result.message}
            </div>
          `;
        }
      } catch (error) {
        messageDiv.innerHTML = `
          <div class="form-message error">
            ❌ Server not responding. Please try again.
          </div>
        `;
      }
    });
  </script>
</body>
</html>
